{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        .loader {

    width: 90px;
    height: 90px;

    border-radius: 50%;

    border: 6px solid transparent;

    border-top: 6px solid #00ffcc;

    border-right: 6px solid #28a745;

    animation: spin 0.8s linear infinite;

    box-shadow:
        0 0 15px #00ffcc,
        0 0 30px #28a745;

}
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            margin: 0;
            background: url("{% static 'images/download.jpg' %}") no-repeat center center/cover;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            top: 0;
            left: 0;
        }

        .login-container {
            position: relative;
            z-index: 2;
        }

        .card {
            border-radius: 15px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.1);
            color: white;
            animation: fadeIn 1s ease-in-out;
        }

        .form-control {
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .btn-custom {
            border-radius: 10px;
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            font-weight: bold;
        }

        .btn-custom:hover {
            opacity: 0.9;
        }

        a {
            color: #00ffcc;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
{% if messages %}
    {% for message in messages %}

        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">

            {{ message }}

            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert">
            </button>

        </div>

    {% endfor %}
{% endif %}
<div class="container d-flex justify-content-center align-items-center vh-100 login-container">

    <div class="card p-4 shadow mx-auto login-card" style="width: 350px;">

        <h3 class="text-center mb-3">COACH <br> login</h3>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" class="form-control mb-3" required>
            <input type="password" name="password" placeholder="Password" class="form-control mb-3" required>

            <button class="btn btn-success w-100" id="loginBtn">

    <span id="loginText">
        Login
    </span>

    <span id="loginSpinner"
          class="spinner-border spinner-border-sm"
          style="display:none;">
    </span>

</button>
        </form>

        <p class="text-center mt-3">
            Don't have an account? <a href="{% url 'register' %}">Register</a>
        </p>

    </div>

</div>
<script>

document.querySelector("form")
.addEventListener("submit", function(){

    // Hide text
    document.getElementById("loginText")
        .style.display = "none";

    // Show spinner
    document.getElementById("loginSpinner")
        .style.display = "inline-block";

});

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
