<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    {% load static %}

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            margin: 0;
            background: url("{% static 'images/download.jpg' %}") no-repeat center center/cover;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            top: 0;
            left: 0;
        }

        .register-container {
            position: relative;
            z-index: 2;
        }

        .card {
            border-radius: 15px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.1);
            color: white;
            animation: fadeIn 1s ease-in-out;
        }

        .form-control {
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .btn-custom {
            border-radius: 10px;
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            font-weight: bold;
        }

        .btn-custom:hover {
            opacity: 0.9;
        }

        a {
            color: #00ffcc;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100 register-container">

    <div class="card p-4 shadow" style="width: 350px;">

        <h3 class="text-center mb-3">Create Account</h3>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" class="form-control mb-3" required>
            
            <!-- 🔥 EMAIL FIELD -->
            <input type="email" name="email" placeholder="Email" class="form-control mb-3" required>

            <input type="password" name="password" placeholder="Password" class="form-control mb-3" required>

            <button class="btn btn-success w-100" id="loginBtn">

    <span id="loginText">
        Register
    </span>

    <span id="loginSpinner"
          class="spinner-border spinner-border-sm"
          style="display:none;">
    </span>

</button>
        </form>

        <p class="text-center mt-3">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </p>

    </div>

</div>
<script>

document.querySelector("form")
.addEventListener("submit", function(){

    // Hide text
    document.getElementById("loginText")
        .style.display = "none";

    // Show spinner
    document.getElementById("loginSpinner")
        .style.display = "inline-block";

});

</script>
</body>
</html>
