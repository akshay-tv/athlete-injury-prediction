<!DOCTYPE html>
<html>
<head>
    <title>Athlete Injury Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    {% load static %}

    <style>
        .dropdown-menu {

    animation: slideDown 0.3s ease;
    z-index: 11000 !important;
}

@keyframes slideDown {

    from {
        opacity: 0;
        transform: translateY(-10px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }

}
        /* Overlay background */
#loadingOverlay {

    display: none;

    position: fixed;

    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.85);

    z-index: 9999;

    justify-content: center;
    align-items: center;

}

/* Circle Loader */
.loader {

    width: 90px;
    height: 90px;

    border-radius: 50%;

    border: 6px solid transparent;

    border-top: 6px solid #00ffcc;

    border-right: 6px solid #28a745;

    animation: spin 0.8s linear infinite;

    box-shadow:
        0 0 15px #00ffcc,
        0 0 30px #28a745;

}

/* Rotation Animation */
@keyframes spin {

    0% {
        transform: rotate(0deg);
    }

    100% {
        transform: rotate(360deg);
    }

}
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            margin: 0;
            background: url("{% static 'images/download.jpg' %}") no-repeat center center/cover;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            top: 0;
            left: 0;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .card {
            border-radius: 15px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .form-control, .form-select {
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
        }

        .form-control::placeholder {
            color: #ddd;
        }

        .btn-custom {
            border-radius: 10px;
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            font-weight: bold;
        }

        .btn-custom:hover {
            opacity: 0.9;
        }

        .navbar {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);

            position: relative;
            z-index: 10000;
        }

        .nav-link, .navbar-brand {
            color: white !important;
        }

        .nav-link:hover {
            color: #00ffcc !important;
        }
    </style>
</head>

<body>
    <!-- 🔄 Loading Spinner Overlay -->
<div id="loadingOverlay">

    <div class="loader"></div>

</div>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid content">
        <a class="navbar-brand fw-bold">🏃 Injury Predictor</a>

        <div class="d-flex align-items-center gap-3">

            
            

            <!-- Profile Icon -->
            <div class="dropdown">

    <a class="nav-link dropdown-toggle"
       href="#"
       role="button"
       data-bs-toggle="dropdown">

        <i class="bi bi-person-circle fs-4"></i>

    </a>

    <ul class="dropdown-menu dropdown-menu-end">

        <!-- User Info -->
        <li class="px-3 py-2">

            <strong>
                {{ request.user.username }}
            </strong>

            <br>

            <small class="text-muted">
                {{ request.user.email }}
            </small>

        </li>

        <li>
            <hr class="dropdown-divider">
        </li>

        <!-- Dashboard -->
        <li>

            <a class="dropdown-item"
               href="{% url 'dashboard' %}">

                📊 Dashboard

            </a>

        </li>

        <!-- New Prediction -->
        <li>

            <a class="dropdown-item"
               href="{% url 'predict_injury' %}">

                📝 New Prediction

            </a>

        </li>

        <!-- Logout -->
        <li>

            <a class="dropdown-item text-danger"
               href="{% url 'logout' %}">

                🚪 Logout

            </a>

        </li>

    </ul>

</div>

            <!-- Logout -->
           

        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-5 content">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Athlete Injury Prediction</h2>

        <form method="post"onsubmit="showLoader()">
            {% csrf_token %}
            <div class="col-md-6 mb-3">
                <label>
                    <i class="bi bi-person-fill"></i>
                    Athlete Name
                </label>

                <input type="text"
                    name="name"
                    class="form-control"
                    placeholder="Enter athlete name"
                    required>

                <small class="text-light">
                    Enter full name of the athlete
                 </small>
            </div>
            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Age</label>
                    <input type="number" name="age" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Gender</label>
                    <select name="gender" class="form-select">
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Sport</label>
                    <select name="sport" class="form-select">
                        <option>Football</option>
                        <option>Cricket</option>
                        <option>Basketball</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Training Hours</label>
                    <input type="number" name="training" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Previous Injuries</label>
                    <input type="number" name="previous" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Fatigue Level</label>
                    <input type="number" name="fatigue" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Sleep Hours</label>
                    <input type="number" step="0.1" name="sleep" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>BMI</label>
                    <input type="number" step="0.1" name="bmi" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Hydration Level</label>
                    <input type="number" step="0.1" name="hydration" class="form-control" required>
                </div>

            </div>

            <div class="text-center mt-3">
                <button type="submit" class="btn btn-custom px-4 py-2">
                    Predict Injury Risk
                </button>
            </div>

        </form>

    </div>

</div>
<script>

function showLoader() {

    document.getElementById("loadingOverlay")
        .style.display = "flex";

}

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
